<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Profil</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; padding-bottom: 80px; }

.header { padding: 14px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06); }
.header-title { font-size: 18px; font-weight: 700; }

.content { padding: 20px; }

.profile-card {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,140,0,0.05));
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
}

.avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #FFD700, #FF8C00); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 14px; }
.profile-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.profile-login { font-size: 13px; color: #888; }

.balance-big { font-size: 32px; font-weight: 900; color: #FFD700; margin: 16px 0 4px; }
.balance-label { font-size: 13px; color: #888; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px; text-align: center; }
.stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-val { font-size: 18px; font-weight: 700; }

.section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 8px; }
.tx-type { font-size: 13px; }
.tx-amount { font-size: 14px; font-weight: 600; }
.tx-status { font-size: 11px; color: #888; margin-top: 2px; }
.tx-date { font-size: 11px; color: #666; }
.dep { color: #4cd964; }
.wit { color: #ff7070; }

.btn-logout { width: 100%; padding: 14px; background: rgba(255,71,71,0.1); border: 1px solid rgba(255,71,71,0.2); border-radius: 12px; color: #ff7070; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 20px; transition: all 0.2s; }
.btn-logout:hover { background: rgba(255,71,71,0.2); }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; padding: 10px 0 20px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; color: #666; font-size: 11px; text-decoration: none; }
.nav-item.active, .nav-item:hover { color: #FFD700; }
.nav-item span:first-child { font-size: 22px; }
</style>
</head>
<body>
<div class="header"><div class="header-title">👤 Profil</div></div>

<div class="content">
  <div class="profile-card">
    <div class="avatar">👤</div>
    <div class="profile-name" id="pName">Yuklanmoqda...</div>
    <div class="profile-login" id="pLogin"></div>
    <div class="balance-big" id="pBalance">0</div>
    <div class="balance-label">so'm</div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Jami yutuq</div>
      <div class="stat-val" id="pWon" style="color:#4cd964">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Jami yutqazish</div>
      <div class="stat-val" id="pLost" style="color:#ff7070">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Telegram ID</div>
      <div class="stat-val" id="pTgId" style="font-size:14px;color:#5bb8ff">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Ro'yxat sanasi</div>
      <div class="stat-val" id="pDate" style="font-size:13px;color:#888">—</div>
    </div>
  </div>
  
  <div class="section-title">💳 So'nggi to'lovlar</div>
  <div id="txList"><div style="text-align:center;color:#888;padding:20px">Yuklanmoqda...</div></div>
  
  <button class="btn-logout" onclick="logout()">🚪 Chiqish</button>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="/game"><span>🎮</span><span>O'yinlar</span></a>
  <a class="nav-item" href="/game/history"><span>📊</span><span>Tarix</span></a>
  <a class="nav-item active" href="/game/profile"><span>👤</span><span>Profil</span></a>
</nav>

<script>
const API = 'https://c-backend-production.up.railway.app/api';
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/';

async function loadProfile() {
  try {
    const r = await fetch(`${API}/users/me`, {headers: {'Authorization': `Bearer ${TOKEN}`}});
    const u = await r.json();
    
    document.getElementById('pName').textContent = u.username || u.login;
    document.getElementById('pLogin').textContent = `@${u.login}`;
    document.getElementById('pBalance').textContent = Math.floor(u.balance).toLocaleString();
    document.getElementById('pWon').textContent = Math.floor(u.total_won).toLocaleString();
    document.getElementById('pLost').textContent = Math.floor(u.total_lost).toLocaleString();
    document.getElementById('pTgId').textContent = u.telegram_id;
    document.getElementById('pDate').textContent = new Date(u.created_at).toLocaleDateString('uz-UZ');
  } catch(e) {}
}

async function loadTx() {
  try {
    const r = await fetch(`${API}/payments/history`, {headers: {'Authorization': `Bearer ${TOKEN}`}});
    const txs = await r.json();
    
    if (!txs.length) {
      document.getElementById('txList').innerHTML = '<div style="text-align:center;color:#888;padding:20px">To\'lov tarixi yo\'q</div>';
      return;
    }
    
    document.getElementById('txList').innerHTML = txs.map(tx => {
      const isDeposit = tx.type === 'deposit';
      const statusMap = { pending: '⏳ Kutilmoqda', confirmed: '✅ Tasdiqlangan', cancelled: '❌ Bekor qilindi' };
      const date = new Date(tx.created_at).toLocaleString('uz-UZ', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
      
      return `
        <div class="tx-item">
          <div>
            <div class="tx-type">${isDeposit ? '➕ To\'ldirish' : '➖ Yechish'}</div>
            <div class="tx-status">${statusMap[tx.status] || tx.status}</div>
          </div>
          <div style="text-align:right">
            <div class="tx-amount ${isDeposit ? 'dep' : 'wit'}">${isDeposit ? '+' : '-'}${Math.floor(tx.amount).toLocaleString()} so'm</div>
            <div class="tx-date">${date}</div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {}
}

function logout() {
  if (confirm('Chiqmoqchimisiz?')) {
    localStorage.clear();
    window.location.href = '/';
  }
}

loadProfile();
loadTx();
</script>
</body>
</html>
