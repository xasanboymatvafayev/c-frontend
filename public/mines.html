<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mines</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a070a; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.back-btn { color: #aaa; font-size: 20px; text-decoration: none; }
.game-title { font-size: 16px; font-weight: 700; color: #9c6fd6; letter-spacing: 1px; }
.balance-display { font-size: 13px; color: #FFD700; font-weight: 600; }

/* GAME AREA */
.game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  gap: 16px;
  overflow: hidden;
}

/* STATS ROW */
.stats-row {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 320px;
}

.stat-box {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 10px 12px;
  text-align: center;
}
.stat-box-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-box-value { font-size: 18px; font-weight: 700; margin-top: 3px; }
.mult-color { color: #9c6fd6; }
.win-color { color: #FFD700; }

/* MINES GRID */
.mines-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 320px;
}

.cell {
  aspect-ratio: 1;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(150,100,255,0.1), transparent 70%);
  opacity: 0;
  transition: opacity 0.2s;
}

.cell:hover:not(.opened):not(.mine-revealed):not(.inactive) { 
  border-color: rgba(150,100,255,0.3);
  background: rgba(150,100,255,0.08);
  transform: scale(1.05);
}

.cell:hover:not(.opened):not(.mine-revealed):not(.inactive)::before { opacity: 1; }

.cell.opened {
  background: rgba(76, 217, 100, 0.1);
  border-color: rgba(76, 217, 100, 0.3);
  cursor: default;
  animation: openPop 0.25s ease;
}

.cell.mine-revealed {
  background: rgba(255, 71, 71, 0.15);
  border-color: rgba(255, 71, 71, 0.4);
  cursor: default;
  animation: minePop 0.4s ease;
}

.cell.inactive { cursor: default; opacity: 0.3; }

@keyframes openPop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes minePop { 0% { transform: scale(0.8); } 30% { transform: scale(1.3); } 70% { transform: scale(0.95); } 100% { transform: scale(1); } }

/* CONTROLS */
.controls {
  flex-shrink: 0;
  background: #0e0e1e;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 14px 16px;
}

.control-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}

.ctrl-label { font-size: 12px; color: #888; white-space: nowrap; }

.ctrl-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 9px 12px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  outline: none;
  font-family: inherit;
  flex: 1;
}

.mines-select {
  flex: 0.6;
}

.btn-row { display: flex; gap: 10px; }

.main-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-start { background: linear-gradient(135deg, #9c6fd6, #5a2ea6); color: #fff; }
.btn-cashout { background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000; }
.btn-disabled { background: rgba(255,255,255,0.05); color: #666; cursor: not-allowed; }

.result-bar {
  text-align: center;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  display: none;
  margin-bottom: 10px;
}
.res-win { background: rgba(76,217,100,0.15); color: #4cd964; }
.res-lose { background: rgba(255,71,71,0.15); color: #ff7070; }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/game">←</a>
  <div class="game-title">💣 MINES</div>
  <div class="balance-display">💰 <span id="bal">0</span></div>
</div>

<div class="game-area">
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-box-label">Koeffitsient</div>
      <div class="stat-box-value mult-color" id="multDisplay">1.00×</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-label">Potensial</div>
      <div class="stat-box-value win-color" id="potentialWin">0 so'm</div>
    </div>
  </div>
  
  <div class="mines-grid" id="minesGrid"></div>
</div>

<div class="controls">
  <div class="result-bar" id="resultBar"></div>
  
  <div class="control-row">
    <span class="ctrl-label">Tikuv:</span>
    <input class="ctrl-input" type="number" id="betAmount" value="1000" min="100">
    <span class="ctrl-label">Mina:</span>
    <select class="ctrl-input mines-select" id="minesCount">
      <option value="1">1 💣</option>
      <option value="3" selected>3 💣</option>
      <option value="5">5 💣</option>
      <option value="10">10 💣</option>
      <option value="15">15 💣</option>
      <option value="20">20 💣</option>
    </select>
  </div>
  
  <div class="btn-row">
    <button class="main-btn btn-start" id="startBtn" onclick="startGame()">BOSHLASH</button>
    <button class="main-btn btn-disabled" id="cashoutBtn" onclick="doCashout()" disabled>CASHOUT</button>
  </div>
</div>

<script>
const API = '__BACKEND_URL__/api';
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/';

let sessionId = null;
let gameActive = false;
let betAmount = 0;
let openedCells = [];
let currentMult = 1.0;

function buildGrid() {
  const grid = document.getElementById('minesGrid');
  grid.innerHTML = '';
  
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (!gameActive ? ' inactive' : '');
    cell.id = `cell-${i}`;
    cell.innerHTML = '💎';
    cell.onclick = () => openCell(i);
    grid.appendChild(cell);
  }
}

async function startGame() {
  const amount = parseFloat(document.getElementById('betAmount').value);
  const mines = parseInt(document.getElementById('minesCount').value);
  
  if (!amount || amount < 100) { alert('Minimum 100 so\'m!'); return; }
  
  document.getElementById('startBtn').disabled = true;
  document.getElementById('resultBar').style.display = 'none';
  
  try {
    const resp = await fetch(`${API}/games/mines/start`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({amount, mines_count: mines})
    });
    const data = await resp.json();
    
    if (resp.ok) {
      sessionId = data.session_id;
      gameActive = true;
      betAmount = amount;
      openedCells = [];
      currentMult = 1.0;
      
      document.getElementById('multDisplay').textContent = '1.00×';
      document.getElementById('potentialWin').textContent = '0 so\'m';
      document.getElementById('startBtn').textContent = 'O\'yin davom etmoqda';
      
      buildGrid();
      loadBalance();
    } else {
      alert(data.detail || 'Xatolik!');
      document.getElementById('startBtn').disabled = false;
    }
  } catch(e) {
    alert('Server xatosi');
    document.getElementById('startBtn').disabled = false;
  }
}

async function openCell(index) {
  if (!gameActive || !sessionId) return;
  if (openedCells.includes(index)) return;
  
  const cell = document.getElementById(`cell-${index}`);
  cell.onclick = null; // Prevent double click
  cell.innerHTML = '⏳';
  
  try {
    const resp = await fetch(`${API}/games/mines/open`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, cell: index})
    });
    const data = await resp.json();
    
    if (data.result === 'mine') {
      // MINE! Show explosion
      cell.innerHTML = '💥';
      cell.className = 'cell mine-revealed';
      
      // Reveal all mines
      if (data.mine_positions) {
        data.mine_positions.forEach(mineIdx => {
          const mc = document.getElementById(`cell-${mineIdx}`);
          if (mc && mineIdx !== index) {
            mc.innerHTML = '💣';
            mc.className = 'cell mine-revealed';
          }
        });
      }
      
      endGame('lose', '💥 BOOM! Minaga tegdingiz!');
      
    } else if (data.result === 'safe' || data.result === 'win') {
      cell.innerHTML = '💎';
      cell.className = 'cell opened';
      openedCells.push(index);
      
      currentMult = data.multiplier;
      document.getElementById('multDisplay').textContent = data.multiplier.toFixed(2) + '×';
      document.getElementById('potentialWin').textContent = `${Math.floor(data.potential_win || 0).toLocaleString()} so'm`;
      
      // Enable cashout
      const cashBtn = document.getElementById('cashoutBtn');
      cashBtn.disabled = false;
      cashBtn.className = 'main-btn btn-cashout';
      cashBtn.textContent = `CASHOUT (${Math.floor(data.potential_win || 0).toLocaleString()})`;
      
      if (data.result === 'win') {
        // All safe cells opened
        endGame('win', `🎉 Barcha xavfsiz kataklar ochildi! ${Math.floor(data.win_amount).toLocaleString()} so'm!`);
        if (data.mine_positions) {
          data.mine_positions.forEach(mineIdx => {
            const mc = document.getElementById(`cell-${mineIdx}`);
            if (mc) { mc.innerHTML = '💣'; mc.className = 'cell mine-revealed'; }
          });
        }
        loadBalance();
      }
    }
  } catch(e) {
    cell.innerHTML = '💎';
    cell.onclick = () => openCell(index);
    alert('Server xatosi');
  }
}

async function doCashout() {
  if (!gameActive || !sessionId) return;
  
  try {
    const resp = await fetch(`${API}/games/mines/cashout?session_id=${sessionId}`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`}
    });
    const data = await resp.json();
    
    if (resp.ok) {
      // Reveal mines
      if (data.mine_positions) {
        data.mine_positions.forEach(mineIdx => {
          if (!openedCells.includes(mineIdx)) {
            const mc = document.getElementById(`cell-${mineIdx}`);
            if (mc) { mc.innerHTML = '💣'; mc.className = 'cell mine-revealed'; }
          }
        });
      }
      endGame('win', `💰 Cashout: ${Math.floor(data.win_amount).toLocaleString()} so'm (${data.multiplier}×)`);
      loadBalance();
    }
  } catch(e) {}
}

function endGame(type, message) {
  gameActive = false;
  sessionId = null;
  
  // Disable all cells
  document.querySelectorAll('.cell:not(.opened):not(.mine-revealed)').forEach(c => {
    c.className = c.className + ' inactive';
    c.onclick = null;
  });
  
  const bar = document.getElementById('resultBar');
  bar.textContent = message;
  bar.className = `result-bar res-${type}`;
  bar.style.display = 'block';
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = 'QAYTA BOSHLASH';
  
  const cashBtn = document.getElementById('cashoutBtn');
  cashBtn.disabled = true;
  cashBtn.className = 'main-btn btn-disabled';
  cashBtn.textContent = 'CASHOUT';
}

async function loadBalance() {
  try {
    const r = await fetch(`${API}/users/balance`, {headers: {'Authorization': `Bearer ${TOKEN}`}});
    const d = await r.json();
    document.getElementById('bal').textContent = Math.floor(d.balance).toLocaleString();
  } catch(e) {}
}

// INIT
buildGrid();
loadBalance();
</script>
</body>
</html>
