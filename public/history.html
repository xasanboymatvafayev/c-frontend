<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tarix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; padding-bottom: 80px; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 18px; font-weight: 700; }

.content { padding: 20px; }

.filter-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.filter-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #888; font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s; }
.filter-btn.active { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.3); color: #FFD700; }

.bet-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  margin-bottom: 10px;
}

.bet-left { display: flex; align-items: center; gap: 12px; }
.bet-icon { font-size: 28px; }
.bet-game { font-size: 14px; font-weight: 600; }
.bet-date { font-size: 11px; color: #888; margin-top: 2px; }
.bet-right { text-align: right; }
.bet-amount { font-size: 14px; font-weight: 700; }
.bet-mult { font-size: 12px; color: #888; margin-top: 2px; }
.win { color: #4cd964; }
.lose { color: #ff7070; }
.cashout { color: #FFD700; }

.empty-state { text-align: center; padding: 60px 20px; color: #888; }
.empty-state div { font-size: 48px; margin-bottom: 12px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; padding: 10px 0 20px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px; color: #666; font-size: 11px; text-decoration: none; }
.nav-item.active, .nav-item:hover { color: #FFD700; }
.nav-item span:first-child { font-size: 22px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-title">📊 Tikuv Tarixi</div>
</div>

<div class="content">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterBets('all', this)">Barchasi</button>
    <button class="filter-btn" onclick="filterBets('aviator', this)">✈️ Aviator</button>
    <button class="filter-btn" onclick="filterBets('apple', this)">🍎 Apple</button>
    <button class="filter-btn" onclick="filterBets('mines', this)">💣 Mines</button>
    <button class="filter-btn" onclick="filterBets('win', this)">✅ Yutuqlar</button>
    <button class="filter-btn" onclick="filterBets('lose', this)">❌ Yutqazishlar</button>
  </div>
  
  <div id="betsList"></div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="/game"><span>🎮</span><span>O'yinlar</span></a>
  <a class="nav-item active" href="/game/history"><span>📊</span><span>Tarix</span></a>
  <a class="nav-item" href="/game/profile"><span>👤</span><span>Profil</span></a>
</nav>

<script>
const API = '__BACKEND_URL__/api';
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/';

let allBets = [];
const GAME_ICONS = { aviator: '✈️', apple: '🍎', mines: '💣' };
const GAME_NAMES = { aviator: 'Aviator', apple: 'Apple Fortune', mines: 'Mines' };

async function loadHistory() {
  try {
    const r = await fetch(`${API}/games/history?limit=50`, {headers: {'Authorization': `Bearer ${TOKEN}`}});
    allBets = await r.json();
    renderBets(allBets);
  } catch(e) {}
}

function renderBets(bets) {
  const list = document.getElementById('betsList');
  if (!bets.length) {
    list.innerHTML = '<div class="empty-state"><div>🎰</div><p>Hali tikuv yo\'q</p></div>';
    return;
  }
  
  list.innerHTML = bets.map(b => {
    const resultClass = b.result === 'win' || b.result === 'cashout' ? (b.result === 'cashout' ? 'cashout' : 'win') : 'lose';
    const sign = b.result === 'lose' ? '-' : '+';
    const showAmount = b.result === 'lose' ? b.amount : (b.win_amount || b.amount);
    const date = new Date(b.created_at).toLocaleString('uz-UZ', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
    
    return `
      <div class="bet-item">
        <div class="bet-left">
          <span class="bet-icon">${GAME_ICONS[b.game] || '🎮'}</span>
          <div>
            <div class="bet-game">${GAME_NAMES[b.game] || b.game}</div>
            <div class="bet-date">${date}</div>
          </div>
        </div>
        <div class="bet-right">
          <div class="bet-amount ${resultClass}">${sign}${Math.floor(showAmount).toLocaleString()} so'm</div>
          <div class="bet-mult">${b.multiplier ? b.multiplier + '×' : ''} ${b.result === 'cashout' ? 'CASHOUT' : b.result.toUpperCase()}</div>
        </div>
      </div>
    `;
  }).join('');
}

function filterBets(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  let filtered = allBets;
  if (type === 'win') filtered = allBets.filter(b => b.result === 'win' || b.result === 'cashout');
  else if (type === 'lose') filtered = allBets.filter(b => b.result === 'lose');
  else if (type !== 'all') filtered = allBets.filter(b => b.game === type);
  
  renderBets(filtered);
}

loadHistory();
</script>
</body>
</html>
