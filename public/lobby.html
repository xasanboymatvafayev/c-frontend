<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Casino - O'yinlar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* HEADER */
.header {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo { 
  font-size: 20px; 
  font-weight: 700; 
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.balance-pill {
  background: rgba(255, 180, 0, 0.12);
  border: 1px solid rgba(255, 180, 0, 0.25);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  color: #FFD700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* MAIN CONTENT */
.content { padding: 20px; }

.greeting {
  margin-bottom: 24px;
}

.greeting h2 { font-size: 22px; font-weight: 700; }
.greeting p { color: #888; font-size: 14px; margin-top: 4px; }

/* GAME CARDS */
.games-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 28px;
}

.game-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 18px;
}

.game-card.aviator::before { background: radial-gradient(circle at center, rgba(255,100,50,0.15), transparent 70%); }
.game-card.apple::before { background: radial-gradient(circle at center, rgba(50,200,100,0.15), transparent 70%); }
.game-card.mines::before { background: radial-gradient(circle at center, rgba(150,50,255,0.15), transparent 70%); }

.game-card:hover::before { opacity: 1; }
.game-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
.game-card:active { transform: scale(0.97); }

.game-icon { font-size: 42px; display: block; margin-bottom: 10px; }
.game-name { font-size: 14px; font-weight: 600; color: #fff; }
.game-desc { font-size: 11px; color: #888; margin-top: 4px; }

.game-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-hot { background: rgba(255,80,50,0.2); color: #ff6b50; border: 1px solid rgba(255,80,50,0.3); }
.badge-new { background: rgba(50,200,100,0.2); color: #4cd964; border: 1px solid rgba(50,200,100,0.3); }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px;
}

.stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-size: 18px; font-weight: 700; }
.stat-won { color: #4cd964; }
.stat-lost { color: #ff6b50; }

/* ACTION BUTTONS */
.action-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.action-btn {
  padding: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-deposit {
  background: linear-gradient(135deg, #00c853, #1b5e20);
  color: #fff;
}

.btn-withdraw {
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}

.action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.action-btn:active { transform: scale(0.97); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,26,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  padding: 10px 0 20px;
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px;
  border-radius: 12px;
  transition: all 0.2s;
  color: #666;
  font-size: 11px;
  text-decoration: none;
}

.nav-item.active, .nav-item:hover { color: #FFD700; }
.nav-item span:first-child { font-size: 22px; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #13132a;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 40px;
  width: 100%;
  max-width: 480px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  text-align: center;
}

.modal-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 16px;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  outline: none;
  font-family: inherit;
  margin-bottom: 16px;
}

.modal-input:focus { border-color: rgba(255,180,0,0.5); }

.modal-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  color: #000;
  transition: all 0.2s;
  margin-bottom: 10px;
}

.modal-btn:hover { opacity: 0.9; }
.modal-cancel { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(30,30,50,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transition: transform 0.3s;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(76, 217, 100, 0.4); color: #4cd964; }
.toast.error { border-color: rgba(255, 107, 80, 0.4); color: #ff6b50; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🎰 CASINO</div>
  <div class="balance-pill" onclick="refreshBalance()">
    💰 <span id="balanceDisplay">0</span> so'm
  </div>
</div>

<div class="content">
  <div class="greeting">
    <h2>Xush kelibsiz! 👋</h2>
    <p id="usernameDisplay" style="color:#888">Yuklanmoqda...</p>
  </div>
  
  <!-- GAME CARDS -->
  <div class="games-grid">
    <div class="game-card aviator" onclick="openGame('aviator')">
      <span class="game-badge badge-hot">🔥 HOT</span>
      <span class="game-icon">✈️</span>
      <div class="game-name">Aviator</div>
      <div class="game-desc">Crash o'yini</div>
    </div>
    
    <div class="game-card apple" onclick="openGame('apple')">
      <span class="game-badge badge-new">⭐ TOP</span>
      <span class="game-icon">🍎</span>
      <div class="game-name">Apple Fortune</div>
      <div class="game-desc">Olma tanlash</div>
    </div>
    
    <div class="game-card mines" onclick="openGame('mines')" style="grid-column: span 2;">
      <span class="game-badge badge-new">💎 VIP</span>
      <span class="game-icon">💣</span>
      <div class="game-name">Mines</div>
      <div class="game-desc">5×5 minalar o'yini</div>
    </div>
  </div>
  
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Jami yutuq</div>
      <div class="stat-value stat-won" id="totalWon">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Jami yutqazish</div>
      <div class="stat-value stat-lost" id="totalLost">0</div>
    </div>
  </div>
  
  <!-- ACTION BUTTONS -->
  <div class="action-btns">
    <button class="action-btn btn-deposit" onclick="openDeposit()">
      ➕ To'ldirish
    </button>
    <button class="action-btn btn-withdraw" onclick="openWithdraw()">
      ➖ Yechish
    </button>
  </div>
</div>

<!-- DEPOSIT MODAL -->
<div class="modal-overlay" id="depositModal">
  <div class="modal">
    <div class="modal-title">💳 Balans to'ldirish</div>
    <input class="modal-input" type="number" id="depositAmount" placeholder="Summa (so'm)" min="1000">
    <button class="modal-btn" onclick="submitDeposit()">To'lov yaratish</button>
    <button class="modal-btn modal-cancel" onclick="closeModal('depositModal')">Bekor qilish</button>
  </div>
</div>

<!-- WITHDRAW MODAL -->
<div class="modal-overlay" id="withdrawModal">
  <div class="modal">
    <div class="modal-title">💸 Balans yechish</div>
    <input class="modal-input" type="number" id="withdrawAmount" placeholder="Summa (so'm)">
    <input class="modal-input" type="text" id="withdrawCard" placeholder="Karta raqami" style="margin-top:-6px">
    <button class="modal-btn" onclick="submitWithdraw()">So'rov yuborish</button>
    <button class="modal-btn modal-cancel" onclick="closeModal('withdrawModal')">Bekor qilish</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item active" href="/game">
    <span>🎮</span>
    <span>O'yinlar</span>
  </a>
  <a class="nav-item" href="/game/history">
    <span>📊</span>
    <span>Tarix</span>
  </a>
  <a class="nav-item" href="/game/profile">
    <span>👤</span>
    <span>Profil</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = '__BACKEND_URL__/api';
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/';

let userData = {};

async function loadUser() {
  try {
    const resp = await fetch(`${API}/users/me`, {headers: {'Authorization': `Bearer ${TOKEN}`}});
    if (resp.status === 401) { logout(); return; }
    userData = await resp.json();
    
    document.getElementById('balanceDisplay').textContent = formatMoney(userData.balance);
    document.getElementById('usernameDisplay').textContent = userData.username || userData.login;
    document.getElementById('totalWon').textContent = formatMoney(userData.total_won);
    document.getElementById('totalLost').textContent = formatMoney(userData.total_lost);
  } catch(e) {}
}

async function refreshBalance() {
  await loadUser();
  showToast('Balans yangilandi', 'success');
}

function formatMoney(n) {
  return Math.floor(n || 0).toLocaleString('uz-UZ');
}

function openGame(game) {
  window.location.href = `/game/${game}`;
}

function openDeposit() {
  document.getElementById('depositModal').classList.add('open');
}

function openWithdraw() {
  document.getElementById('withdrawModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function submitDeposit() {
  const amount = parseFloat(document.getElementById('depositAmount').value);
  if (!amount || amount < 1000) { showToast('Minimum 1,000 so\'m!', 'error'); return; }
  
  try {
    const resp = await fetch(`${API}/payments/deposit/create`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({amount})
    });
    const data = await resp.json();
    
    if (resp.ok) {
      closeModal('depositModal');
      showToast(`To'lov yaratildi! Admin tasdiqlashini kuting`, 'success');
    } else {
      showToast(data.detail || 'Xatolik', 'error');
    }
  } catch(e) {
    showToast('Server xatosi', 'error');
  }
}

async function submitWithdraw() {
  const amount = parseFloat(document.getElementById('withdrawAmount').value);
  const card = document.getElementById('withdrawCard').value;
  if (!amount || amount <= 0) { showToast('Summani kiriting!', 'error'); return; }
  
  try {
    const resp = await fetch(`${API}/payments/withdraw/request`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({amount, card_number: card})
    });
    const data = await resp.json();
    
    if (resp.ok) {
      closeModal('withdrawModal');
      showToast('So\'rov yuborildi!', 'success');
      loadUser();
    } else {
      showToast(data.detail || 'Xatolik', 'error');
    }
  } catch(e) {
    showToast('Server xatosi', 'error');
  }
}

function logout() {
  localStorage.clear();
  window.location.href = '/';
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('open'); });
});

loadUser();
</script>
</body>
</html>
