<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Casino - Kirish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  .bg-stars {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a1040 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 50%),
                #0a0a1a;
    z-index: 0;
  }
  
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    padding: 24px 20px;
  }
  
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  
  .logo-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(255, 180, 0, 0.5));
  }
  
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  
  .logo p {
    color: #888;
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 1px;
  }
  
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 32px 28px;
    backdrop-filter: blur(20px);
  }
  
  .form-group {
    margin-bottom: 18px;
  }
  
  label {
    display: block;
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  
  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  
  input:focus {
    border-color: rgba(255, 180, 0, 0.5);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.1);
  }
  
  input::placeholder { color: #555; }
  
  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    font-family: inherit;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #000;
    margin-top: 8px;
  }
  
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  
  .error-msg {
    background: rgba(255, 80, 80, 0.15);
    border: 1px solid rgba(255, 80, 80, 0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #ff6b6b;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  
  .info-text {
    text-align: center;
    color: #666;
    font-size: 12px;
    margin-top: 20px;
    line-height: 1.6;
  }
  
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-stars"></div>

<div class="container">
  <div class="logo">
    <span class="logo-icon">🎰</span>
    <h1>CASINO</h1>
    <p>Pul tikish platformasi</p>
  </div>
  
  <div class="card">
    <div class="form-group">
      <label>Login</label>
      <input type="text" id="login" placeholder="loginiz..." autocomplete="username">
    </div>
    
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="password" placeholder="parolingiz..." autocomplete="current-password">
    </div>
    
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
      Kirish
    </button>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <p class="info-text">
      Login va parolni Telegram botdan oling.<br>
      <strong style="color:#888">/start</strong> buyrug'ini bosing.
    </p>
  </div>
</div>

<script>
const API = 'https://c-backend-production.up.railway.app/api';

// Agar token bo'lsa, to'g'ridan-to'g'ri game ga
if (localStorage.getItem('token')) {
  window.location.href = '/game';
}

document.getElementById('login').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keypress', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin() {
  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errMsg = document.getElementById('errorMsg');
  
  if (!login || !password) { showError('Login va parolni kiriting!'); return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⏳</span> Kirish...';
  errMsg.style.display = 'none';
  
  try {
    const resp = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({login, password})
    });
    const data = await resp.json();
    
    if (resp.ok) {
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user_id', data.user_id);
      localStorage.setItem('username', data.username || login);
      window.location.href = '/game';
    } else {
      showError(data.detail || 'Login yoki parol noto\'g\'ri');
    }
  } catch(e) {
    showError('Server bilan bog\'lanib bo\'lmadi');
  }
  
  btn.disabled = false;
  btn.innerHTML = 'Kirish';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
